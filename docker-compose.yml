# Phase 0 单 service:FastAPI 启动后既跑 API 又托管前端 dist。
# 见 ADR-17 / §8.1。
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tickflow-stock-panel
    ports:
      - "127.0.0.1:${PORT:-3018}:3018"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./tiers.yaml:/app/tiers.yaml:ro
      - ${LONGBRIDGE_OPENAPI_DIR:-/root/.longbridge/openapi}:/root/.longbridge/openapi
    restart: unless-stopped
